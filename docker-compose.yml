version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: banana_jack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banana_jack
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d banana_jack']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
